    <h1>Interactive Scenario Modeller — Example</h1>

        <strong>Year</strong> (simulation year),
        <strong>Selected Buildings</strong> (UPRNs that passed constraints),
        <strong>Budget Spent</strong> (cumulative annual spend), and
        <strong>Substation Loads</strong> (reserved projected demand per substation).
